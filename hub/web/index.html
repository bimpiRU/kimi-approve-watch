<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JARVIS HUB</title>
<style>
:root {
  --accent: #00e5ff; --ok: #39ff8e; --warn: #ffd75f; --text: #b8c0cc;
  --bg: #050b12; --panel: #0a1420; --border: rgba(0, 229, 255, .35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font: 14px/1.5 "Cascadia Code", Consolas, monospace; padding: 18px; }
h1 { color: var(--accent); letter-spacing: .4em; text-shadow: 0 0 18px var(--accent); font-size: 22px; }
header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
#clock { color: #5b6b7c; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 12px; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; box-shadow: 0 0 14px rgba(0,229,255,.07) inset; }
.panel h2 { color: var(--accent); font-size: 12px; letter-spacing: .25em; text-transform: uppercase; margin-bottom: 8px; }
.panel.wide { grid-column: 1 / -1; }
.kv { white-space: pre-wrap; }
.on { color: var(--ok); } .off { color: #ff5f5f; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
td, th { text-align: left; padding: 3px 8px; border-bottom: 1px solid #12202f; }
tr.run { cursor: pointer; } tr.run:hover { background: #0d1b2a; }
form { display: flex; gap: 8px; flex-wrap: wrap; }
select, input, button { background: #0d1b2a; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font: inherit; }
input { flex: 1; min-width: 220px; }
button { cursor: pointer; color: var(--accent); }
button:hover { background: #123047; box-shadow: 0 0 10px var(--border); }
.cmds { display: flex; gap: 8px; flex-wrap: wrap; }
#result { white-space: pre-wrap; background: #07101a; border-radius: 6px; padding: 10px; max-height: 300px; overflow: auto; margin-top: 8px; display: none; }
.dim { color: #5b6b7c; font-size: 12px; }
</style>
</head>
<body>
<header><h1>J A R V I S &nbsp; H U B</h1><span id="clock"></span></header>
<div class="grid">
  <div class="panel"><h2>KAW</h2><div id="kaw" class="kv"></div></div>
  <div class="panel"><h2>Система</h2><div id="sys" class="kv"></div></div>
  <div class="panel"><h2>Агенты</h2><div id="agents"></div></div>
  <div class="panel"><h2>GitHub</h2><div id="repos"></div></div>
  <div class="panel wide"><h2>Поручить задачу</h2>
    <form id="dispatch"><select id="agent"></select><input id="task" placeholder="задача для агента…"><button type="submit">Отправить</button></form>
    <div class="dim" id="dispatchMsg"></div>
  </div>
  <div class="panel"><h2>Запуски</h2><table id="runs"></table></div>
  <div class="panel"><h2>Команды</h2><div class="cmds" id="cmds"></div>
    <div class="dim" style="margin-top:8px">prune: <button id="prune">убить зависшие</button></div>
  </div>
  <div class="panel wide" id="resultWrap" style="display:none"><h2>Результат</h2><div id="result"></div></div>
</div>
<script>
const $ = id => document.getElementById(id);
async function refresh() {
  try {
    const s = await (await fetch('/api/state')).json();
    if (s.theme) for (const [k, v] of Object.entries(s.theme)) document.documentElement.style.setProperty(k, v);
    $('clock').textContent = s.time;
    $('kaw').innerHTML = `watcher&nbsp;&nbsp;&nbsp; <span class="${s.kaw.watcher ? 'on' : 'off'}">${s.kaw.watcher || 'OFF'}</span>\nstabilizer <span class="${s.kaw.stabilizer ? 'on' : 'off'}">${s.kaw.stabilizer || 'OFF'}</span>`;
    $('sys').textContent = `CPU ${s.system.cpu}%  RAM ${s.system.ramFree}/${s.system.ramTotal} GB свободно  C: ${s.system.diskFree} GB\nGPU: ${s.system.gpu} (auto=${s.system.gpuAuto})  Режим: ${s.system.perf} (сеть: ${s.system.perfAC}, батарея: ${s.system.perfBatt})`;
    $('agents').innerHTML = s.agents.map(a => `<div>${a.busy ? '🟡' : '🟢'} <b>${a.name}</b> <span class="dim">${a.model}</span></div>`).join('');
    $('repos').innerHTML = s.repos.map(r => `<div class="dim">${r.repo} — <span style="color:var(--accent)">${r.branch}</span>, изм: ${r.dirty}${r.sync}</div>`).join('');
    $('runs').innerHTML = '<tr><th>run</th><th>exit</th><th>старт</th></tr>' + s.runs.map(r =>
      `<tr class="run" data-id="${r.id}"><td>${r.id}</td><td>${r.exit}</td><td>${r.started}</td></tr>`).join('');
    document.querySelectorAll('tr.run').forEach(tr => tr.onclick = async () => {
      const t = await (await fetch('/api/result?id=' + tr.dataset.id)).text();
      $('resultWrap').style.display = 'block'; $('result').style.display = 'block'; $('result').textContent = t || '(пусто)';
    });
    if (!$('agent').options.length) {
      $('agent').innerHTML = s.agents.map(a => `<option>${a.name}</option>`).join('');
      $('cmds').innerHTML = s.commands.map(c => `<button data-cmd="${c.name}" title="${c.desc}">${c.name}</button>`).join('');
      document.querySelectorAll('[data-cmd]').forEach(b => b.onclick = () => fetch('/api/cmd', { method: 'POST', body: JSON.stringify({ name: b.dataset.cmd }) }));
    }
  } catch (e) { $('clock').textContent = 'сервер недоступен'; }
}
$('dispatch').onsubmit = async e => {
  e.preventDefault();
  const r = await (await fetch('/api/dispatch', { method: 'POST', body: JSON.stringify({ agent: $('agent').value, task: $('task').value }) })).json();
  $('dispatchMsg').textContent = r.ok ? `запущен: ${r.runId}` : `ошибка: ${r.error}`;
  if (r.ok) $('task').value = '';
  setTimeout(refresh, 500);
};
$('prune').onclick = () => fetch('/api/prune', { method: 'POST', body: '{}' }).then(refresh);
refresh(); setInterval(refresh, 5000);
</script>
</body>
</html>
